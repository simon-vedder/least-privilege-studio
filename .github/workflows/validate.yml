# .github/workflows/validate.yml
#
# Runs on PRs to validate task YAML files and lint code.

name: Validate

on:
  pull_request:
    branches: [main]
    paths:
      - "data/tasks/**"
      - "src/**"
      - "scripts/**"

jobs:
  validate-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Validate task YAML files
        run: node scripts/validate-tasks.js
